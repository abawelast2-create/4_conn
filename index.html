<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>مجموعة صرح الإتقان وشركة فضاء المحركات - الوثائق الرسمية</title>
    <meta name="description" content="الوثائق الرسمية والنظام الداخلي لمجموعة صرح الإتقان المحدودة وشركة فضاء المحركات">
    <meta property="og:title" content="مجموعة صرح الإتقان وشركة فضاء المحركات - الوثائق الرسمية">
    <meta property="og:description" content="الوثائق الرسمية والنظام الداخلي لمجموعة صرح الإتقان المحدودة وشركة فضاء المحركات">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ar_SA">
    <meta property="og:site_name" content="صرح الإتقان وفضاء المحركات">
    <meta property="og:image" content="https://sarh.site/1_cons/1.jpeg">
    <meta property="og:url" content="https://sarh.site/1_cons/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="constitution-theme.css">
    <style>
        :root {
            --primary: #d4af37;
            --primary-dark: #b8860b;
            --primary-light: #f4e4b8;
            --text-dark: #2c2416;
            --text-light: #6b5b2e;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(212, 175, 55, 0.18);
            --shadow-soft: 0 8px 32px rgba(107, 91, 46, 0.12);
            --shadow-glow: 0 0 40px rgba(212, 175, 55, 0.15);
        }
        
        * { 
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Amiri', serif;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 20px 48px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            padding: 48px 32px;
            border-radius: 32px;
            margin-bottom: 40px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            box-shadow: 
                var(--shadow-soft),
                inset 0 1px 0 rgba(255,255,255,0.8),
                0 0 0 1px rgba(212,175,55,0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 70%);
            animation: headerPulse 8s ease-in-out infinite;
        }
        
        .header:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 12px 48px rgba(107, 91, 46, 0.18),
                var(--shadow-glow),
                inset 0 1px 0 rgba(255,255,255,0.9);
        }
        
        @keyframes headerPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .header-logo {
            width: 160px;
            height: 120px;
            margin: 0 auto 24px;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 10px 30px rgba(212, 175, 55, 0.4));
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .header-logo:hover {
            transform: scale(1.15) translateY(-5px);
            filter: 
                drop-shadow(0 15px 45px rgba(212, 175, 55, 0.6))
                drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
        }
        
        .header-logo svg {
            width: 100%;
            height: 100%;
        }

        .header h1 {
            margin: 0 0 16px;
            font-family: 'Reem Kufi', sans-serif;
            font-weight: 700;
            color: var(--text-dark);
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            line-height: 1.3;
            position: relative;
            z-index: 2;
        }

        .header p {
            margin: 0;
            color: var(--text-light);
            font-size: 1.1rem;
            font-weight: 400;
            position: relative;
            z-index: 2;
            opacity: 0.9;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding: 0 4px;
        }
        
        .toolbar-title {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
            letter-spacing: -0.01em;
        }
        /* شريط البحث */
        .search-bar {
            margin-bottom: 28px;
            position: relative;
        }
        .search-bar input {
            width: 100%;
            padding: 16px 56px 16px 20px;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            background: var(--glass-bg);
            backdrop-filter: blur(8px) saturate(180%);
            -webkit-backdrop-filter: blur(8px) saturate(180%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        .search-bar input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 
                0 0 0 4px rgba(212,175,55,0.12),
                inset 0 1px 3px rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.85);
        }
        .search-bar input::placeholder {
            color: var(--text-light);
            opacity: 0.6;
        }
        .search-bar::before {
            content: '🔍';
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            pointer-events: none;
            opacity: 0.5;
            transition: all 0.3s;
        }
        .search-bar:focus-within::before {
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
        }

        /* الإحصائيات */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(255,254,249,0.95), rgba(255,249,237,0.85));
            border: 2px solid rgba(212,175,55,0.25);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #b8860b;
            font-family: 'Reem Kufi', sans-serif;
            line-height: 1;
            margin-bottom: 4px;
        }
        .stat-card .stat-label {
            font-size: 0.85rem;
            color: #6b5b2e;
        }
        .toolbar-title {
            margin: 0;
            font-family: 'Reem Kufi', sans-serif;
            color: #6b5b2e;
            font-size: 1rem;
        }

        .add-btn {
            width: 56px;
            height: 56px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            color: #fff;
            font-size: 28px;
            font-weight: 300;
            line-height: 1;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            box-shadow: 
                0 8px 24px rgba(212,175,55,0.3),
                inset 0 1px 0 rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }
        
        .add-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .add-btn:hover::before {
            width: 200px;
            height: 200px;
        }
        
        .add-btn:hover {
            transform: scale(1.12) rotate(90deg);
            box-shadow: 
                0 12px 36px rgba(212,175,55,0.45),
                0 0 0 8px rgba(212,175,55,0.1),
                inset 0 1px 0 rgba(255,255,255,0.4);
        }
        
        .add-btn:active {
            transform: scale(1.05) rotate(90deg);
        }

        .documents-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .document-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 16px;
            align-items: center;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            box-shadow: 
                var(--shadow-soft),
                inset 0 1px 0 rgba(255,255,255,0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .document-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.1), transparent);
            transition: left 0.6s ease;
        }
        
        .document-item:hover::before {
            left: 100%;
        }
        
        .document-item:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(212,175,55,0.3);
            box-shadow: 
                0 12px 40px rgba(107, 91, 46, 0.15),
                0 0 30px rgba(212,175,55,0.15),
                inset 0 1px 0 rgba(255,255,255,0.8);
        }

        .document-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            box-shadow: 
                0 8px 20px rgba(212,175,55,0.25),
                inset 0 1px 0 rgba(255,255,255,0.3);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 2;
        }
        
        .document-item:hover .document-icon {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 
                0 12px 30px rgba(212,175,55,0.35),
                inset 0 1px 0 rgba(255,255,255,0.4);
        }

        .document-content h3 {
            margin: 0 0 8px;
            font-family: 'Reem Kufi', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: -0.01em;
        }

        .document-content p {
            margin: 0;
            color: var(--text-light);
            font-size: 0.95rem;
            line-height: 1.6;
            opacity: 0.85;
        }

        .doc-meta {
            margin-top: 6px;
            color: #8b6914;
            font-size: 0.78rem;
        }

        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, rgba(76,175,80,0.1) 0%, rgba(46,125,50,0.08) 100%);
            border: 1px solid rgba(76,175,80,0.3);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            color: #2E7D32;
            margin-top: 6px;
            font-family: 'Amiri', serif;
        }
        .security-serial {
            font-family: 'Courier New', monospace;
            background: rgba(212,175,55,0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            color: #6b5b2e;
            margin-top: 4px;
            display: inline-block;
        }

        .document-link {
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            border-radius: 12px;
            padding: 12px 24px;
            font-family: 'Reem Kufi', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(212,175,55,0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }
        
        .document-link::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .document-link:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .document-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212,175,55,0.4);
        }
        
        .document-link:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 22px;
            padding: 10px;
            color: #6b5b2e;
            font-size: 0.85rem;
        }

        .footer p { margin: 0 0 4px; }



        @media (max-width: 700px) {
            .document-item {
                grid-template-columns: auto 1fr;
            }

            .document-link {
                grid-column: 1 / -1;
                text-align: center;
            }
        }

        /* ════════════════════════════════════════════════════════ */
        /*               ✦ الطابع الملكي — زخارف وشفافيات وسحر ✦               */
        /* ════════════════════════════════════════════════════════ */

        /* نسيج ورق عتيق */
        body {
            background:
                radial-gradient(ellipse at 15% 15%, rgba(212,175,55,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 85%, rgba(184,134,11,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(255,249,237,0.3) 0%, transparent 40%),
                linear-gradient(180deg, #d8d0c0 0%, #e2dcd0 30%, #ddd6c8 70%, #d5cdc0 100%) !important;
        }
        body::before {
            content: '' !important;
            position: fixed !important;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E") !important;
            pointer-events: none !important;
            z-index: 0 !important;
        }

        /* حركات ذهبية ساحرة */
        @keyframes goldShimmer {
            0% { background-position: -300% center; }
            100% { background-position: 300% center; }
        }
        @keyframes pulseAura {
            0%, 100% { box-shadow: 0 0 20px rgba(212,175,55,0.2), 0 4px 12px rgba(184,134,11,0.3); }
            50% { box-shadow: 0 0 40px rgba(212,175,55,0.45), 0 4px 12px rgba(184,134,11,0.3), 0 0 80px rgba(212,175,55,0.12); }
        }
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes cornerPulse {
            0%, 100% { opacity: 0.1; text-shadow: 0 0 15px rgba(212,175,55,0.3); }
            50% { opacity: 0.22; text-shadow: 0 0 30px rgba(212,175,55,0.5); }
        }
        @keyframes ornamentSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* الحاوية الرئيسية */
        .container {
            position: relative;
            z-index: 1;
            animation: slideUpFade 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ❧ زخرفة الترويسة */
        .header {
            position: relative !important;
            overflow: hidden !important;
            background: linear-gradient(180deg,
                rgba(255,254,247,0.96) 0%,
                rgba(255,250,240,0.98) 30%,
                rgba(254,249,237,0.97) 60%,
                rgba(255,254,247,0.96) 100%) !important;
            border: 2px solid rgba(212,175,55,0.4) !important;
            box-shadow:
                0 8px 40px rgba(212,175,55,0.18),
                0 2px 8px rgba(0,0,0,0.04),
                inset 0 0 80px rgba(255,249,237,0.6),
                inset 0 1px 0 rgba(255,255,255,0.9) !important;
        }
        /* وميض ذهبي على الترويسة */
        .header::before {
            content: '' !important;
            position: absolute !important;
            top: 0; left: -100%; right: -100%; bottom: 0;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(212,175,55,0.03) 20%,
                rgba(255,249,237,0.14) 40%,
                rgba(212,175,55,0.07) 50%,
                rgba(255,249,237,0.14) 60%,
                rgba(212,175,55,0.03) 80%,
                transparent 100%) !important;
            background-size: 200% 100%;
            animation: goldShimmer 7s ease-in-out infinite !important;
            pointer-events: none;
            z-index: 0;
        }
        /* إطار داخلي زخرفي */
        .header::after {
            content: '' !important;
            position: absolute !important;
            top: 6px; right: 6px; bottom: 6px; left: 6px;
            border: 1px solid rgba(212,175,55,0.18) !important;
            border-radius: 11px !important;
            pointer-events: none;
            z-index: 0;
        }
        .header > * { position: relative; z-index: 1; }

        /* الشعار - توهج وحركة */
        .header-logo {
            animation: smoothFloat 6s ease-in-out infinite;
        }

        /* البطاقات - شفافية زجاجية */
        .document-item {
            backdrop-filter: blur(14px) saturate(1.4) !important;
            -webkit-backdrop-filter: blur(14px) saturate(1.4) !important;
            background: linear-gradient(180deg,
                rgba(255,254,249,0.88) 0%,
                rgba(250,248,243,0.84) 100%) !important;
            border: 1px solid rgba(212,175,55,0.2) !important;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) !important;
            position: relative !important;
            overflow: hidden !important;
            animation: fadeSlideUp 0.6s ease-out backwards;
        }
        /* خط ذهبي جانبي */
        .document-item::before {
            content: '' !important;
            position: absolute !important;
            top: 0; right: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg,
                transparent,
                rgba(212,175,55,0.5) 20%,
                #d4af37 50%,
                rgba(212,175,55,0.5) 80%,
                transparent) !important;
            opacity: 0;
            transition: opacity 0.4s !important;
        }
        /* وميض خفيف */
        .document-item::after {
            content: '' !important;
            position: absolute !important;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg,
                transparent,
                rgba(255,249,237,0.18),
                transparent) !important;
            transition: left 0.7s ease !important;
            pointer-events: none;
        }
        .document-item:hover {
            transform: translateY(-4px) scale(1.005) !important;
            box-shadow:
                0 16px 40px rgba(212,175,55,0.18),
                0 4px 12px rgba(0,0,0,0.06),
                inset 0 0 30px rgba(255,249,237,0.4) !important;
            border-color: rgba(212,175,55,0.5) !important;
        }
        .document-item:hover::before { opacity: 1 !important; }
        .document-item:hover::after { left: 100% !important; }

        /* تأخير ظهور البطاقات */
        .document-item:nth-child(1) { animation-delay: 0.05s; }
        .document-item:nth-child(2) { animation-delay: 0.1s; }
        .document-item:nth-child(3) { animation-delay: 0.15s; }
        .document-item:nth-child(4) { animation-delay: 0.2s; }
        .document-item:nth-child(5) { animation-delay: 0.25s; }
        .document-item:nth-child(6) { animation-delay: 0.3s; }
        .document-item:nth-child(7) { animation-delay: 0.35s; }
        .document-item:nth-child(8) { animation-delay: 0.4s; }

        /* أيقونة البطاقة - وميض */
        .document-icon {
            box-shadow: 0 4px 15px rgba(184,134,11,0.3), inset 0 1px 0 rgba(255,255,255,0.3) !important;
            position: relative;
            overflow: hidden;
        }
        .document-icon::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.18) 50%, transparent 60%);
            animation: goldShimmer 4s ease-in-out infinite;
        }

        /* زر الإضافة - تحديث عصري */
        .add-btn {
            animation: none !important;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
            position: relative !important;
            overflow: hidden !important;
        }

        /* رابط العرض - وميض */
        .document-link {
            position: relative !important;
            overflow: hidden !important;
            box-shadow: 0 3px 12px rgba(184,134,11,0.25) !important;
            transition: all 0.3s ease !important;
        }
        .document-link:hover {
            transform: scale(1.06) !important;
            box-shadow: 0 6px 20px rgba(184,134,11,0.35) !important;
        }
        .document-link::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
            transition: left 0.45s ease;
        }
        .document-link:hover::before { left: 100%; }

    <script>
        const STORAGE_KEY = 'sarh_custom_documents_v1';

        const baseDocuments = [

        ];

        const listEl = document.getElementById('documentsList');

        function loadCustomDocuments() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                const parsed = raw ? JSON.parse(raw) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function saveCustomDocuments(items) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
        }

        function formatDate(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '';
            return date.toLocaleString('ar-SA');
        }

        function renderDocuments() {
            const customDocuments = loadCustomDocuments();
            const items = [...baseDocuments, ...customDocuments]
                .sort((first, second) => Number(second.createdAt || 0) - Number(first.createdAt || 0));

            listEl.innerHTML = items.map((doc) => {
                const dateText = formatDate(doc.createdAt);
                
                // علامة الأمان للوثائق المخصصة
                let securityHTML = '';
                if (doc.securityInfo) {
                    securityHTML = `
                        <div class="security-badge">
                            <span>✅</span>
                            <span>وثيقة مُصدقة رقمياً</span>
                        </div>
                        <div class="security-serial">الرقم التسلسلي: ${doc.securityInfo.serialNumber}</div>
                    `;
                }
                
                return `
                    <div class="document-item">
                        <div class="document-icon">${doc.icon || '📄'}</div>
                        <div class="document-content">
                            <h3>${doc.title}</h3>
                            <p>${doc.description}</p>
                            <div class="doc-meta">${dateText ? `تاريخ الإضافة: ${dateText}` : ''}</div>
                            ${securityHTML}
                        </div>
                        <a class="document-link" href="${doc.link}" target="_self">عرض</a>
                    </div>
                `;
            }).join('');
        }

        renderDocuments();
        
        // ══════════════════════════════════════════════════════
        //  تأثير المربعات المتوهجة المتتبعة للمؤشر
        // ══════════════════════════════════════════════════════
        
        // إنشاء الحاوية
        const cursorTrail = document.createElement('div');
        cursorTrail.id = 'cursorTrail';
        cursorTrail.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        `;
        document.body.appendChild(cursorTrail);
        
        // إعدادات التتبع
        const squares = [];
        const maxSquares = 12;
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        
        // إنشاء عناصر المربعات
        for (let i = 0; i < maxSquares; i++) {
            const square = document.createElement('div');
            square.style.cssText = `
                position: absolute;
                width: 28px;
                height: 28px;
                border: 2px solid rgba(212, 175, 55, ${0.5 - i * 0.035});
                border-radius: 3px;
                transform: rotate(45deg);
                pointer-events: none;
                box-shadow: 
                    0 0 ${20 - i}px rgba(255, 224, 102, ${0.6 - i * 0.04}),
                    inset 0 0 ${12 - i * 0.5}px rgba(255, 224, 102, ${0.35 - i * 0.025});
                background: radial-gradient(circle at 30% 30%, 
                    rgba(255, 249, 230, ${0.25 - i * 0.018}), 
                    rgba(212, 175, 55, ${0.12 - i * 0.008}));
                transition: opacity 0.15s ease;
            `;
            cursorTrail.appendChild(square);
            squares.push({
                el: square,
                x: mouseX,
                y: mouseY,
                delay: i * 0.04
            });
        }
        
        // تتبع حركة الماوس
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        // تتبع حركة اللمس
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }, { passive: true });
        
        // تحريك المربعات
        function animateSquares() {
            squares.forEach((square, index) => {
                const targetX = mouseX - 14;
                const targetY = mouseY - 14;
                
                // تتبع سلس مع تأخير
                const speed = 0.12 - square.delay;
                square.x += (targetX - square.x) * speed;
                square.y += (targetY - square.y) * speed;
                
                // حساب الشفافية والحجم والدوران
                const opacity = (1 - index / maxSquares) * 0.7;
                const scale = 1 - (index / maxSquares) * 0.45;
                const rotation = 45 + (index * 6);
                
                // تطبيق التحولات
                square.el.style.left = square.x + 'px';
                square.el.style.top = square.y + 'px';
                square.el.style.opacity = opacity;
                square.el.style.transform = `rotate(${rotation}deg) scale(${scale})`;
                
                // توهج متغير
                const glowIntensity = (1 - index / maxSquares) * 22;
                const glowOpacity = opacity * 0.8;
                square.el.style.boxShadow = `
                    0 0 ${glowIntensity}px rgba(255, 224, 102, ${glowOpacity}),
                    inset 0 0 ${glowIntensity * 0.55}px rgba(255, 224, 102, ${glowOpacity * 0.6})
                `;
            });
            
            requestAnimationFrame(animateSquares);
        }
        
        // بدء الرسوم المتحركة
        animateSquares();
    </script>
</body>
</html>
