<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار البريد الإلكتروني - تشخيص</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }
        .section {
            background: #f8f9fa;
            border-right: 4px solid #667eea;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .section h2 {
            color: #495057;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .test-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin: 10px 0;
        }
        .test-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .result {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            border-right: 4px solid #3b82f6;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
            max-height: 400px;
            overflow-y: auto;
        }
        .success {
            border-right-color: #10b981;
            background: #d1fae5;
            color: #065f46;
        }
        .error {
            border-right-color: #ef4444;
            background: #fee2e2;
            color: #991b1b;
        }
        .warning {
            border-right-color: #f59e0b;
            background: #fef3c7;
            color: #92400e;
        }
        .input-group {
            margin: 15px 0;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
        }
        .spinner {
            display: none;
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading .spinner {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 أداة تشخيص البريد الإلكتروني</h1>
        
        <div class="section">
            <h2>📋 اختبار 1: التحقق من إعدادات PHP</h2>
            <button class="test-btn" onclick="checkPHPSettings()">🔍 فحص إعدادات PHP</button>
            <div id="php-result" class="result" style="display:none;"></div>
        </div>

        <div class="section">
            <h2>📧 اختبار 2: إرسال بريد تجريبي (mail() function)</h2>
            <div class="input-group">
                <label>البريد المستقبل:</label>
                <input type="email" id="test-email" value="alkurdiabdullah444@gmail.com" placeholder="email@example.com">
            </div>
            <button class="test-btn" onclick="testBasicEmail()">📮 اختبار mail() البسيطة</button>
            <div id="mail-result" class="result" style="display:none;"></div>
        </div>

        <div class="section">
            <h2>⚡ اختبار 3: إرسال عبر Gmail SMTP</h2>
            <button class="test-btn" onclick="testGmailSMTP()">📧 اختبار Gmail SMTP</button>
            <div id="smtp-result" class="result" style="display:none;"></div>
        </div>

        <div class="section">
            <h2>🔗 اختبار 4: API Endpoint</h2>
            <button class="test-btn" onclick="testAPI()">🌐 اختبار /api/send-approval-email</button>
            <div id="api-result" class="result" style="display:none;"></div>
        </div>

        <div class="spinner" id="spinner"></div>
    </div>

    <script>
        function showSpinner() {
            document.getElementById('spinner').parentElement.classList.add('loading');
        }
        
        function hideSpinner() {
            document.getElementById('spinner').parentElement.classList.remove('loading');
        }

        async function checkPHPSettings() {
            showSpinner();
            const resultDiv = document.getElementById('php-result');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.textContent = 'جاري الفحص...';

            try {
                const response = await fetch('email-test.php?action=check_php');
                const data = await response.json();
                
                resultDiv.className = 'result ' + (data.success ? 'success' : 'warning');
                resultDiv.textContent = data.message;
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ خطأ: ' + error.message;
            } finally {
                hideSpinner();
            }
        }

        async function testBasicEmail() {
            showSpinner();
            const resultDiv = document.getElementById('mail-result');
            const email = document.getElementById('test-email').value;
            
            if (!email) {
                alert('الرجاء إدخال بريد إلكتروني');
                hideSpinner();
                return;
            }

            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.textContent = 'جاري الإرسال...';

            try {
                const response = await fetch('email-test.php?action=test_mail&email=' + encodeURIComponent(email));
                const data = await response.json();
                
                resultDiv.className = 'result ' + (data.success ? 'success' : 'error');
                resultDiv.textContent = data.message;
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ خطأ: ' + error.message;
            } finally {
                hideSpinner();
            }
        }

        async function testGmailSMTP() {
            showSpinner();
            const resultDiv = document.getElementById('smtp-result');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.textContent = 'جاري الإرسال عبر Gmail SMTP...';

            try {
                const response = await fetch('email-test.php?action=test_smtp');
                const data = await response.json();
                
                resultDiv.className = 'result ' + (data.success ? 'success' : 'error');
                resultDiv.textContent = data.message;
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ خطأ: ' + error.message;
            } finally {
                hideSpinner();
            }
        }

        async function testAPI() {
            showSpinner();
            const resultDiv = document.getElementById('api-result');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.textContent = 'جاري اختبار API...';

            try {
                const response = await fetch('/api/send-approval-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: 'اختبار API',
                        description: 'اختبار من صفحة التشخيص',
                        serialNumber: 'TEST-001',
                        uuid: 'test-' + Date.now(),
                        date: new Date().toLocaleDateString('ar-SA'),
                        contentExcerpt: 'هذا نص تجريبي للاختبار'
                    })
                });
                
                const data = await response.json();
                
                resultDiv.className = 'result ' + (data.success ? 'success' : 'error');
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ خطأ: ' + error.message;
            } finally {
                hideSpinner();
            }
        }
    </script>
</body>
</html>
