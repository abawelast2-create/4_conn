<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر الكتب الرسمية - صرح الإتقان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="constitution-theme.css">
    <style>
        :root {
            --frame-margin: 15mm;
            --content-padding: 22mm;
        }

        body {
            margin: 0;
            padding: 24px 0;
            font-family: 'Amiri', serif;
        }

        .editor-shell {
            width: min(1320px, 96vw);
            margin: 0 auto;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 20px;
            align-items: start;
            position: relative;
            z-index: 1;
        }

        .form-panel {
            position: sticky;
            top: 16px;
            background: linear-gradient(180deg, rgba(255,252,245,0.97) 0%, rgba(252,248,238,0.97) 100%);
            border: 1px solid rgba(212,175,55,0.35);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            padding: 16px;
        }

        .form-panel h2 {
            font-family: 'Reem Kufi', sans-serif;
            margin: 0 0 10px;
            color: #6b5b2e;
            font-size: 1.1rem;
        }

        .form-row {
            margin-bottom: 10px;
        }

        .form-row label {
            display: block;
            font-family: 'Reem Kufi', sans-serif;
            font-size: 0.85rem;
            color: #6b5b2e;
            margin-bottom: 4px;
        }

        .field {
            width: 100%;
            border: 1px solid rgba(212,175,55,0.45);
            border-radius: 8px;
            padding: 8px 10px;
            background: rgba(255,255,255,0.9);
            font-family: 'Amiri', serif;
            font-size: 1rem;
        }

        .field:focus {
            outline: none;
            border-color: #b8860b;
            box-shadow: 0 0 0 2px rgba(184,134,11,0.12);
        }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            border: 0;
            border-radius: 8px;
            padding: 10px 12px;
            font-family: 'Reem Kufi', sans-serif;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, #b8860b 0%, #d4af37 100%);
            box-shadow: 0 4px 10px rgba(184,134,11,0.35);
        }

        .btn.secondary {
            background: linear-gradient(135deg, #6b5b2e 0%, #8b6914 100%);
        }

        .page-container {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            position: relative;
            padding: 0;
            overflow: hidden;
        }

        .page-content {
            position: relative;
            min-height: calc(297mm - 30mm);
            padding: var(--content-padding);
            z-index: 3;
            display: flex;
            flex-direction: column;
            background: rgba(255,254,249,0.4);
        }

        .page-frame {
            position: absolute;
            top: var(--frame-margin);
            right: var(--frame-margin);
            bottom: var(--frame-margin);
            left: var(--frame-margin);
            border: 3px double #b8860b;
            pointer-events: none;
            z-index: 1;
        }

        .frame-corner {
            position: absolute;
            width: calc(var(--frame-margin) - 5mm);
            height: calc(var(--frame-margin) - 5mm);
            z-index: 2;
            border-color: rgba(184,134,11,0.9);
            border-style: solid;
            border-width: 0;
        }

        .frame-corner.tr { top: 5mm; right: 5mm; border-top-width: 3px; border-right-width: 3px; }
        .frame-corner.tl { top: 5mm; left: 5mm; border-top-width: 3px; border-left-width: 3px; }
        .frame-corner.br { bottom: 5mm; right: 5mm; border-bottom-width: 3px; border-right-width: 3px; }
        .frame-corner.bl { bottom: 5mm; left: 5mm; border-bottom-width: 3px; border-left-width: 3px; }

        .print-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #b8860b;
            color: #6b5b2e;
            font-family: 'Reem Kufi', sans-serif;
            font-size: 11px;
            font-weight: 700;
            padding-bottom: 10px;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .header-right { text-align: right; }
        .header-center { text-align: center; }
        .header-left { text-align: left; }

        .logo-img {
            height: 64px;
            border: 1px solid #d4af37;
            border-radius: 6px;
            padding: 3px;
            background: #fff;
        }

        .doc-title {
            text-align: center;
            font-family: 'Reem Kufi', sans-serif;
            color: #6b5b2e;
            margin-bottom: 10px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
            font-size: 0.95rem;
        }

        .subject {
            border: 1px solid rgba(212,175,55,0.5);
            border-right: 4px solid #b8860b;
            background: rgba(255,249,237,0.55);
            padding: 10px 12px;
            border-radius: 4px;
            margin-bottom: 14px;
        }

        .letter-body {
            line-height: 1.95;
            font-size: 1.06rem;
            text-align: justify;
            white-space: pre-line;
            flex: 1;
        }

        .signature {
            text-align: left;
            margin-top: 22px;
            line-height: 1.8;
        }

        .print-footer {
            margin-top: 20px;
            border-top: 1px solid rgba(212,175,55,0.45);
            padding-top: 6px;
            text-align: center;
            color: #6b5b2e;
            font-size: 0.8rem;
        }

        @media (max-width: 1120px) {
            .editor-shell {
                grid-template-columns: 1fr;
            }

            .form-panel {
                position: static;
            }

            .page-container {
                width: 100%;
                min-height: auto;
            }
        }

        @media print {
            body {
                padding: 0;
                background: #fff !important;
            }

            .form-panel,
            .print-tools,
            .top-link {
                display: none !important;
            }

            .editor-shell {
                display: block;
                width: 100%;
            }

            .page-container {
                width: 210mm !important;
                min-height: 297mm !important;
                margin: 0 !important;
                box-shadow: none !important;
                page-break-after: avoid;
            }
        }
    </style>
</head>
<body>
    <div class="editor-shell">
        <aside class="form-panel print-tools">
            <h2>محرر الكتب الرسمية</h2>
            <div class="form-row">
                <label for="docType">نوع الكتاب</label>
                <select id="docType" class="field">
                    <option value="كتاب إداري">كتاب إداري</option>
                    <option value="تعميم إداري">تعميم إداري</option>
                    <option value="قرار إداري">قرار إداري</option>
                    <option value="إنذار إداري">إنذار إداري</option>
                </select>
            </div>
            <div class="form-row">
                <label for="bookNo">رقم الكتاب</label>
                <input id="bookNo" class="field" value="SARH/2026/115">
            </div>
            <div class="form-row">
                <label for="bookDate">التاريخ</label>
                <input id="bookDate" class="field" value="15 فبراير 2026">
            </div>
            <div class="form-row">
                <label for="from">الجهة المصدرة</label>
                <input id="from" class="field" value="مكتب التحول الرقمي والحوكمة المؤسسية">
            </div>
            <div class="form-row">
                <label for="to">الجهة الموجه إليها</label>
                <input id="to" class="field" value="مدراء الفروع والإدارات التنفيذية">
            </div>
            <div class="form-row">
                <label for="subject">الموضوع</label>
                <input id="subject" class="field" value="اعتماد آلية موحدة لإصدار الكتب الرسمية">
            </div>
            <div class="form-row">
                <label for="intro">الافتتاحية</label>
                <textarea id="intro" class="field" rows="2">السلام عليكم ورحمة الله وبركاته،،</textarea>
            </div>
            <div class="form-row">
                <label for="bodyText">نص الكتاب</label>
                <textarea id="bodyText" class="field" rows="8">حرصًا على توحيد المخاطبات الرسمية ورفع جودة المراسلات الداخلية، تقرر اعتماد محرر الكتب الرسمية كنموذج موحد للإصدار.

يُعتمد هذا النموذج في جميع الكتب الإدارية والتعاميم والقرارات ابتداءً من تاريخ هذا الكتاب.

يلتزم كل قسم بمراجعة البيانات قبل الطباعة، واعتماد التوقيع والختم وفق الصلاحيات المعتمدة.</textarea>
            </div>
            <div class="form-row">
                <label for="closing">الخاتمة</label>
                <input id="closing" class="field" value="وتقبلوا خالص التحية والتقدير،،">
            </div>
            <div class="form-row">
                <label for="signName">اسم الموقّع</label>
                <input id="signName" class="field" value="عبدالله احمد الكردي">
            </div>
            <div class="form-row">
                <label for="signTitle">الصفة الوظيفية</label>
                <input id="signTitle" class="field" value="مستشار التحول الرقمي">
            </div>

            <div class="action-row">
                <button class="btn" id="printBtn" type="button">طباعة / PDF</button>
                <button class="btn secondary" id="resetBtn" type="button">استعادة الافتراضي</button>
            </div>
        </aside>

        <main>
            <a href="index.html" class="top-link" style="display:inline-block;margin-bottom:8px;color:#6b5b2e;font-family:'Reem Kufi',sans-serif;text-decoration:none;">← الرجوع للصفحة الرئيسية</a>
            <div class="page-container" id="printArea">
                <div class="page-frame"></div>
                <div class="frame-corner tr"></div>
                <div class="frame-corner tl"></div>
                <div class="frame-corner br"></div>
                <div class="frame-corner bl"></div>

                <div class="page-content">
                    <div class="print-header">
                        <div class="header-right">
                            شركة صرح الإتقان<br>
                            Sarah Alitqan Company<br>
                            <span style="font-size: 9px;">الرقم الضريبي: 311697879500003</span>
                        </div>
                        <div class="header-center">
                            <img src="logo.png" alt="شعار صرح الإتقان" class="logo-img" onerror="this.style.display='none'">
                        </div>
                        <div class="header-left">
                            مستشار التحول الرقمي:<br>عبدالله احمد الكردي
                        </div>
                    </div>

                    <h1 class="doc-title" id="previewType">كتاب إداري</h1>

                    <div class="meta-grid">
                        <div><strong>رقم الكتاب:</strong> <span id="previewBookNo"></span></div>
                        <div><strong>التاريخ:</strong> <span id="previewBookDate"></span></div>
                        <div><strong>من:</strong> <span id="previewFrom"></span></div>
                        <div><strong>إلى:</strong> <span id="previewTo"></span></div>
                    </div>

                    <div class="subject"><strong>الموضوع:</strong> <span id="previewSubject"></span></div>

                    <div class="letter-body">
                        <p id="previewIntro"></p>
                        <p id="previewBody"></p>
                        <p id="previewClosing"></p>
                    </div>

                    <div class="signature">
                        <div id="previewSignTitle"></div>
                        <div style="font-weight:bold;" id="previewSignName"></div>
                    </div>

                    <div class="print-footer">محرر الكتب الرسمية - إصدار تلقائي بدون برمجة</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const defaults = {
            docType: 'كتاب إداري',
            bookNo: 'SARH/2026/115',
            bookDate: '15 فبراير 2026',
            from: 'مكتب التحول الرقمي والحوكمة المؤسسية',
            to: 'مدراء الفروع والإدارات التنفيذية',
            subject: 'اعتماد آلية موحدة لإصدار الكتب الرسمية',
            intro: 'السلام عليكم ورحمة الله وبركاته،،',
            bodyText: `حرصًا على توحيد المخاطبات الرسمية ورفع جودة المراسلات الداخلية، تقرر اعتماد محرر الكتب الرسمية كنموذج موحد للإصدار.\n\nيُعتمد هذا النموذج في جميع الكتب الإدارية والتعاميم والقرارات ابتداءً من تاريخ هذا الكتاب.\n\nيلتزم كل قسم بمراجعة البيانات قبل الطباعة، واعتماد التوقيع والختم وفق الصلاحيات المعتمدة.`,
            closing: 'وتقبلوا خالص التحية والتقدير،،',
            signName: 'عبدالله احمد الكردي',
            signTitle: 'مستشار التحول الرقمي'
        };

        const fields = [
            'docType', 'bookNo', 'bookDate', 'from', 'to', 'subject',
            'intro', 'bodyText', 'closing', 'signName', 'signTitle'
        ];

        function syncPreview() {
            document.getElementById('previewType').textContent = document.getElementById('docType').value;
            document.getElementById('previewBookNo').textContent = document.getElementById('bookNo').value;
            document.getElementById('previewBookDate').textContent = document.getElementById('bookDate').value;
            document.getElementById('previewFrom').textContent = document.getElementById('from').value;
            document.getElementById('previewTo').textContent = document.getElementById('to').value;
            document.getElementById('previewSubject').textContent = document.getElementById('subject').value;
            document.getElementById('previewIntro').textContent = document.getElementById('intro').value;
            document.getElementById('previewBody').textContent = document.getElementById('bodyText').value;
            document.getElementById('previewClosing').textContent = document.getElementById('closing').value;
            document.getElementById('previewSignName').textContent = document.getElementById('signName').value;
            document.getElementById('previewSignTitle').textContent = document.getElementById('signTitle').value;
        }

        function resetDefaults() {
            fields.forEach((key) => {
                const input = document.getElementById(key);
                if (input) input.value = defaults[key];
            });
            syncPreview();
        }

        fields.forEach((key) => {
            const input = document.getElementById(key);
            if (!input) return;
            input.addEventListener('input', syncPreview);
            input.addEventListener('change', syncPreview);
        });

        document.getElementById('printBtn').addEventListener('click', () => window.print());
        document.getElementById('resetBtn').addEventListener('click', resetDefaults);

        resetDefaults();
    </script>
</body>
</html>
